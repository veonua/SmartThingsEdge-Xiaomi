name: button-2
components:
  - id: main
    label: "Left"
    capabilities:
    - id: button
      version: 1
    - id: refresh
      version: 1
    - id: batteryLevel
      version: 1
    categories:
    - name: Button
  - id: button2
    label: "Right"
    capabilities:
    - id: button
      version: 1
    categories:
    - name: Button
  - id: group1
    label: "Both buttons"
    capabilities:
    - id: button
      version: 1
    categories:

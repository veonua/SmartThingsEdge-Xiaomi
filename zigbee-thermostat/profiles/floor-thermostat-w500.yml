name: floor-thermostat-w500
components:
- id: main
  capabilities:
  - id: thermostatHeatingSetpoint
    version: 1
    config:
      values:
        - key: "heatingSetpoint.value"
          range: [ 5, 40 ]
          step: 0.5
  
  - id: thermostatMode
    version: 1
    config:
      values:
        - key: "thermostatMode.value"
          enabledValues:
            - off
            - heat
  - id: thermostatOperatingState
    version: 1
    config:
      values:
        - key: "thermostatOperatingState.value"
          enabledValues:
            - heating
            - idle
        - key: "temperatureAlarm.value"
          enabledValues:
            - cleared
            - freeze
            - heat
  
  - id: temperatureMeasurement
    version: 1
  - id: relativeHumidityMeasurement
    version: 1
  - id: powerMeter
    version: 1
  - id: energyMeter
    version: 1
  - id: powerConsumptionReport
    version: 1
  - id: firmwareUpdate
    version: 1
  - id: refresh
    version: 1
  categories:
  - name: Thermostat

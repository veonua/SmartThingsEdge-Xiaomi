name: plug_prefs
components:
- id: main
  capabilities:
  - id: switch
    version: 1
  - id: powerMeter
    version: 1
  - id: energyMeter
    version: 1
  - id: powerConsumptionReport
    version: 1
  - id: voltageMeasurement
    version: 1
  - id: refresh
    version: 1
  - id: firmwareUpdate
    version: 1
  categories:
  - name: SmartPlug
preferences:
  - preferenceId: stse.restorePowerState
    explicit: true

  - preferenceId: stse.maxPowerCN
    explicit: true
  - preferenceId: stse.turnOffIndicatorLight
    explicit: true

  - title: "Auto Off"
    description: "Turn the device automatically off when attached device consumes less than 2W for 20 minutes"
    name: autoOff
    required: true
    preferenceType: boolean
    definition: 
      default: false
    
metadata:
  deviceType: SmartPlug
  ocfDeviceType: oic.d.smartplug
  deviceTypeId: SmartPlug  
